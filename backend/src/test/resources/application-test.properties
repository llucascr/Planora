spring.application.name=backend

# H2 in-memory (PostgreSQL compatibility mode)
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:planora-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.open-in-view=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# OAuth2 placeholders — fake values just to satisfy the resolver
spring.security.oauth2.client.registration.github.client-id=test-client-id
spring.security.oauth2.client.registration.github.client-secret=test-client-secret
spring.security.oauth2.client.registration.github.scope=read:user,repo

# RSA keys (reused from main resources)
jwt.public.key=classpath:app.pub
jwt.private.key=classpath:app.key

# GitHub webhook + app base URL
github.webhook.secret=test-webhook-secret
app.base-url=http://localhost:8080
app.frontend.base-url=http://localhost:3000

# External services (overridden dynamically by WireMock-based integration tests)
api-python.base-url=http://localhost:8000/api/v1
github.api.base-url=https://api.github.com
