name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [main]

# Cancela execuções antigas do mesmo PR quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# O backend fica em backend/; todos os passos `run` executam a partir dele.
defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # As chaves RSA (app.key/app.pub) estão no .gitignore. O JwtConfig e o
      # profile de teste carregam classpath:app.key/app.pub no startup do Spring,
      # então precisam existir antes de rodar os testes.
      - name: Restore RSA keys
        run: |
          echo "${{ secrets.APP_KEY_B64 }}" | base64 -d > src/main/resources/app.key
          echo "${{ secrets.APP_PUB_B64 }}" | base64 -d > src/main/resources/app.pub

      - name: Run tests
        run: ./mvnw test